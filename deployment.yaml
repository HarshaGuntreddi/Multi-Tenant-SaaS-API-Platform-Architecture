apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-api-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: saas-api
  template:
    metadata:
      labels:
        app: saas-api
    spec:
      containers:
      - name: saas-api
        image: yourdockerhub/saas-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5432/saas_db"
